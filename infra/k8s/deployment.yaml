---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-agent
  labels:
    app.kubernetes.io/name: anomaly-agent
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anomaly-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anomaly-agent
    spec:
      serviceAccountName: default
      containers:
        - name: anomaly-agent
          image: "us-central1-docker.pkg.dev/amex-autonomouse-expense-ai/anomaly-agents-dev/agent-api:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: GOOGLE_PROJECT_ID
              value: "amex-autonomouse-expense-ai"
            - name: GOOGLE_REGION
              value: "us-central1"
            - name: LANGFUSE_ENABLED
              value: "true"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: langfuse-secret-key
            - name: LANGFUSE_BASE_URL
              value: "https://cloud.langfuse.com"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: openai-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: anthropic-key
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: slack-bot-token
            - name: SLACK_ALERT_CHANNEL_ID
              value: "C0ASMLDV8Q0"
            - name: SLACK_APPROVAL_CHANNEL_ID
              value: "C0ARQ0JJUAH"
            # Agent model configuration
            - name: MONITORING_AGENT_MODEL
              value: "gpt-4o-mini"
            - name: DIAGNOSIS_AGENT_MODEL
              value: "gpt-4o"
            - name: ACTION_AGENT_MODEL
              value: "gpt-4o"
            - name: FEEDBACK_AGENT_MODEL
              value: "gpt-4o-mini"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
              ephemeral-storage: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-agent
  labels:
    app.kubernetes.io/name: anomaly-agent
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: anomaly-agent
