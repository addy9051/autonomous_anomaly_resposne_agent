---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-agent-trainer
  labels:
    app.kubernetes.io/name: anomaly-agent
    app.kubernetes.io/component: trainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anomaly-agent
      app.kubernetes.io/component: trainer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anomaly-agent
        app.kubernetes.io/component: trainer
    spec:
      serviceAccountName: agent-runtime-ksa
      containers:
        - name: anomaly-agent
          image: "us-central1-docker.pkg.dev/amex-autonomouse-expense-ai/anomaly-agents-dev/agent-api:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: VW_IS_TRAINER
              value: "true"
            - name: VW_MODEL_GCS_BUCKET
              value: "vw-models-amex-autonomouse-expense-ai-dev"
            - name: GOOGLE_PROJECT_ID
              value: "amex-autonomouse-expense-ai"
            - name: GOOGLE_REGION
              value: "us-central1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: openai-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: anthropic-key
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: slack-bot-token
            - name: PAGERDUTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: pagerduty-api-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: postgres-password
          command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-agent-predictor
  labels:
    app.kubernetes.io/name: anomaly-agent
    app.kubernetes.io/component: predictor
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: anomaly-agent
      app.kubernetes.io/component: predictor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anomaly-agent
        app.kubernetes.io/component: predictor
    spec:
      serviceAccountName: agent-runtime-ksa
      containers:
        - name: anomaly-agent
          image: "us-central1-docker.pkg.dev/amex-autonomouse-expense-ai/anomaly-agents-dev/agent-api:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: VW_IS_TRAINER
              value: "false"
            - name: VW_MODEL_GCS_BUCKET
              value: "vw-models-amex-autonomouse-expense-ai-dev"
            - name: GOOGLE_PROJECT_ID
              value: "amex-autonomouse-expense-ai"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: openai-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: anthropic-key
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: slack-bot-token
            - name: PAGERDUTY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: pagerduty-api-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-agent
  labels:
    app.kubernetes.io/name: anomaly-agent
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: anomaly-agent
