apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agent-secrets-provider
  namespace: default
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/amex-autonomouse-expense-ai/secrets/openai-api-key/versions/latest"
        fileName: "openai-api-key"
      - resourceName: "projects/amex-autonomouse-expense-ai/secrets/pagerduty-api-key/versions/latest"
        fileName: "pagerduty-api-key"
      - resourceName: "projects/amex-autonomouse-expense-ai/secrets/slack-bot-token/versions/latest"
        fileName: "slack-bot-token"
      - resourceName: "projects/amex-autonomouse-expense-ai/secrets/n8n-api-key/versions/latest"
        fileName: "n8n-api-key"
      - resourceName: "projects/amex-autonomouse-expense-ai/secrets/postgres-password/versions/latest"
        fileName: "postgres-password"
