apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anomaly-agent.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "anomaly-agent.name" . }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "anomaly-agent.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "anomaly-agent.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "us-central1-docker.pkg.dev/my-project/anomaly-agents/agent-api:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: "production"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: openai-key
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
