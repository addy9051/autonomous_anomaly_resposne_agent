{{- if .Values.canary.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "anomaly-agent.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "anomaly-agent.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "anomaly-agent.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "anomaly-agent.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: GOOGLE_PROJECT_ID
              value: {{ .Values.env.GOOGLE_PROJECT_ID | quote }}
            - name: MESSAGE_BUS_TYPE
              value: {{ .Values.env.MESSAGE_BUS_TYPE | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: openai-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 10m}
      - setWeight: 50
      - pause: {duration: 10m}
{{- end }}
