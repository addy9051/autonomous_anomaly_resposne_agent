# ═══════════════════════════════════════════════════════════════
#  Grafana Tempo Configuration — Distributed Tracing
# ═══════════════════════════════════════════════════════════════

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

overrides:
  defaults:
    global:
      max_traces_per_user: 100000
